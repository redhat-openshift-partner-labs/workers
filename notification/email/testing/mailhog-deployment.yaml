---
# Mailhog - Fake SMTP server for testing
# Captures all emails sent to it without actually sending them
# Perfect for PoC testing
#
# NOTE: Deploy to same namespace as email service
# Namespace will be set via -n flag or kustomization
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  labels:
    app: mailhog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
      - name: mailhog
        image: mailhog/mailhog:v1.0.1
        ports:
        - name: smtp
          containerPort: 1025
          protocol: TCP
        - name: http
          containerPort: 8025
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          tcpSocket:
            port: 8025
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8025
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog-smtp
  labels:
    app: mailhog
spec:
  type: ClusterIP
  ports:
  - name: smtp
    port: 1025
    targetPort: 1025
    protocol: TCP
  selector:
    app: mailhog
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog-web
  labels:
    app: mailhog
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8025
    targetPort: 8025
    protocol: TCP
  selector:
    app: mailhog
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mailhog-web
  labels:
    app: mailhog
spec:
  port:
    targetPort: http
  to:
    kind: Service
    name: mailhog-web
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
