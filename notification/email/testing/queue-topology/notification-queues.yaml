# Extracted from queue/rabbitmq-topology-manifests.yaml
# Only includes queues consumed or produced by notification worker
---
apiVersion: rabbitmq.com/v1beta1
kind: Queue
metadata:
  name: q-notify-user-lab-ready
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/domain: notification
    opl.io/consumer: worker-notification
spec:
  name: notify.user.lab-ready
  vhost: opl
  type: quorum
  durable: true
  arguments:
    x-delivery-limit: 5
    x-dead-letter-exchange: opl.dlx
    x-dead-letter-routing-key: dlq.notification
  rabbitmqClusterReference:
    name: queue

