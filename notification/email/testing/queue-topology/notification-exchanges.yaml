# Extracted from queue/rabbitmq-topology-manifests.yaml
# Only includes exchanges needed by notification worker
---
apiVersion: rabbitmq.com/v1beta1
kind: Exchange
metadata:
  name: ex-notify
  labels:
    app.kubernetes.io/part-of: opl
    opl.io/domain: notification
spec:
  name: opl.notify
  vhost: opl
  type: topic
  durable: true
  autoDelete: false
  rabbitmqClusterReference:
    name: queue

