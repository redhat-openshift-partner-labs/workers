apiVersion: v1
kind: Secret
metadata:
  name: smtp-credentials
  labels:
    app: opl-email-service
type: Opaque
stringData:
  # For Mailhog testing (no credentials needed)
  # For production SMTP, replace with actual credentials:
  #   Gmail: username = your-email@gmail.com, password = app-password
  #   SendGrid: username = apikey, password = your-api-key
  username: ""
  password: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  labels:
    app: opl-email-service
type: Opaque
stringData:
  # RabbitMQ connection settings
  # For testing setup: uses testing/rabbitmq-deployment.yaml
  # Update if RabbitMQ is in different namespace
  host: "rabbitmq.rabbitmq.svc.cluster.local"
  port: "5672"
  user: "admin"
  pass: "admin123"
  vhost: "/"
