apiVersion: v1
kind: Secret
metadata:
  name: smtp-credentials
  labels:
    app: opl-email-service
type: Opaque
stringData:
  # For Mailhog testing (no credentials needed)
  # For production SMTP, replace with actual credentials:
  #   Gmail: username = your-email@gmail.com, password = app-password
  #   SendGrid: username = apikey, password = your-api-key
  username: ""
  password: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  labels:
    app: opl-email-service
type: Opaque
stringData:
  # RabbitMQ connection URL
  # For testing setup: uses testing/rabbitmq-deployment.yaml
  # Update hostname if RabbitMQ is in different namespace
  # Format: amqp://username:password@hostname:port/vhost
  url: "amqp://admin:admin123@rabbitmq.rabbitmq.svc.cluster.local:5672/"
