apiVersion: v1
kind: ConfigMap
metadata:
  name: email-service-config
  labels:
    app: opl-email-service
data:
  # RabbitMQ queue configuration
  consume_queue: "lab.notify.email"
  failed_queue: "lab.notify.email.failed"

  # SMTP configuration (non-sensitive)
  # This value is patched by overlays to match the target namespace
  # For Mailhog testing: mailhog-smtp.<namespace>.svc.cluster.local
  # For production SMTP, update in overlay to use external service
  smtp_host: "mailhog-smtp.NAMESPACE.svc.cluster.local"
  smtp_port: "1025"

  smtp_from: "OpenShift Partner Labs <noreply@openshiftpartnerlabs.com>"
