apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-etl
  namespace: queue
  labels:
    app.kubernetes.io/name: worker-etl
    app.kubernetes.io/component: etl
    app.kubernetes.io/part-of: openshift-partner-labs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: worker-etl
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  # No inbound traffic needed - worker pulls from RabbitMQ
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow connection to RabbitMQ (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
