apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-etl
  namespace: opl-system
  labels:
    app.kubernetes.io/name: worker-etl
    app.kubernetes.io/component: etl
    app.kubernetes.io/part-of: openshift-partner-labs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker-etl
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker-etl
        app.kubernetes.io/component: etl
        app.kubernetes.io/part-of: openshift-partner-labs
    spec:
      serviceAccountName: worker-etl

      # OpenShift SCC compatibility:
      # - Runs as non-root (required by restricted SCC)
      # - Uses arbitrary UID assigned by OpenShift
      # - No privilege escalation
      # - Read-only root filesystem where possible
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: worker-etl
          image: quay.io/opl/worker-etl:latest
          imagePullPolicy: Always

          # Container-level security context for restricted SCC
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          envFrom:
            - configMapRef:
                name: worker-etl-env

          env:
            - name: ETL_RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: worker-etl-rabbitmq
                  key: rabbitmq-user
            - name: ETL_RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: worker-etl-rabbitmq
                  key: rabbitmq-pass

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          volumeMounts:
            - name: etl-schemas
              mountPath: /etc/etl-schemas
              readOnly: true
            - name: tmp
              mountPath: /tmp

          # Liveness: is the process alive?
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f 'python.*worker' > /dev/null"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness: is it connected and ready to process?
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f 'python.*worker' > /dev/null"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: etl-schemas
          configMap:
            name: etl-schemas
        - name: tmp
          emptyDir: {}

      # Graceful shutdown for message processing
      terminationGracePeriodSeconds: 30
