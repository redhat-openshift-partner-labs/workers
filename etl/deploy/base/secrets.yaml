apiVersion: v1
kind: Secret
metadata:
  name: worker-etl-rabbitmq
  namespace: queue
  labels:
    app.kubernetes.io/name: worker-etl
    app.kubernetes.io/component: etl
    app.kubernetes.io/part-of: openshift-partner-labs
type: Opaque
stringData:
  # IMPORTANT: Replace these with actual credentials before deploying
  # Consider using SealedSecrets or External Secrets Operator in production
  rabbitmq-user: "guest"
  rabbitmq-pass: "guest"
---
apiVersion: v1
kind: Secret
metadata:
  name: worker-etl-pull-secret
  namespace: queue
  labels:
    app.kubernetes.io/name: worker-etl
    app.kubernetes.io/component: etl
    app.kubernetes.io/part-of: openshift-partner-labs
type: kubernetes.io/dockerconfigjson
stringData:
  # IMPORTANT: Replace with actual registry credentials before deploying
  # Generate with: kubectl create secret docker-registry --dry-run=client -o yaml
  .dockerconfigjson: |
    {"auths":{"quay.io":{"username":"","password":"","auth":""}}}
