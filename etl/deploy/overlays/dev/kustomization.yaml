apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: queue

resources:
  - ../../base

nameSuffix: ""

patches:
  - target:
      kind: Deployment
      name: worker-etl
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "32Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "128Mi"
  - target:
      kind: ConfigMap
      name: worker-etl-env
    patch: |
      - op: replace
        path: /data/ETL_RABBITMQ_HOST
        value: "rabbitmq.queue.svc.cluster.local"

images:
  - name: quay.io/opl/worker-etl
    newTag: dev
